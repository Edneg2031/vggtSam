<svg xmlns="http://www.w3.org/2000/svg" width="3400" height="4300" viewBox="0 0 3400 4300">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 62px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .section { font: 700 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .box-title { font: 700 31px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .box-text { font: 25px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 23px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .tiny { font: 21px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tag { font: 700 21px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: white; }
      .input { fill: #e0f2fe; stroke: #0284c7; stroke-width: 4; }
      .frozen { fill: #e8eef7; stroke: #4b6b9b; stroke-width: 4; }
      .train { fill: #fff1d6; stroke: #b7791f; stroke-width: 4; }
      .source { fill: #ecfdf5; stroke: #059669; stroke-width: 4; }
      .eval { fill: #f3e8ff; stroke: #7e22ce; stroke-width: 4; }
      .diag { fill: #fef9c3; stroke: #ca8a04; stroke-width: 4; }
      .loss { fill: #ffe4e6; stroke: #be123c; stroke-width: 4; }
      .optional { fill: #f1f5f9; stroke: #64748b; stroke-width: 4; stroke-dasharray: 10 8; }
      .arrow { fill: none; stroke: #334155; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #64748b; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-gray); }
      .grad { fill: none; stroke: #be123c; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-red); stroke-dasharray: 14 8; }
      .nograd { fill: none; stroke: #7e22ce; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-purple); stroke-dasharray: 10 8; }
      .label { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .panel { fill: none; stroke: #cbd5e1; stroke-width: 3; stroke-dasharray: 12 10; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto"><polygon points="0 0,14 5,0 10" fill="#334155"/></marker>
    <marker id="arrow-gray" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto"><polygon points="0 0,14 5,0 10" fill="#64748b"/></marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto"><polygon points="0 0,14 5,0 10" fill="#be123c"/></marker>
    <marker id="arrow-purple" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto"><polygon points="0 0,14 5,0 10" fill="#7e22ce"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="3400" height="4300"/>
  <text class="title" x="120" y="95">当前完整训练 / 消融结构图</text>
  <text class="subtitle" x="120" y="150">核心实验：在 SAM3 原 tracker 流程中注入 StreamVGGT 3D-aware residual，训练 adapter，让后续大视角/遮挡帧重新检出同一实例</text>

  <!-- Section panels -->
  <rect class="panel" x="80" y="210" width="3240" height="640" rx="28"/>
  <text class="section" x="120" y="260">A. 数据与目标构造</text>
  <rect class="panel" x="80" y="910" width="3240" height="900" rx="28"/>
  <text class="section" x="120" y="960">B. Frozen feature extraction</text>
  <rect class="panel" x="80" y="1870" width="3240" height="980" rx="28"/>
  <text class="section" x="120" y="1920">C. Trainable 3D-aware fusion + SAM3 residual adapter</text>
  <rect class="panel" x="80" y="2910" width="3240" height="860" rx="28"/>
  <text class="section" x="120" y="2960">D. 训练路径、对照路径与诊断输出</text>
  <rect class="panel" x="80" y="3830" width="3240" height="360" rx="28"/>
  <text class="section" x="120" y="3880">E. 可选分支与当前消融设置</text>

  <!-- A data -->
  <rect class="input" x="180" y="310" width="720" height="210" rx="24"/>
  <text class="box-title" x="220" y="370">Processed ScanNet++ pinhole</text>
  <text class="box-text" x="220" y="416">manifest + scene_id</text>
  <text class="box-text" x="220" y="452">RGB / semantic mask / instance mask</text>
  <text class="box-text" x="220" y="488">GT pointmap / camera 可选</text>

  <rect class="input" x="1050" y="300" width="850" height="230" rx="24"/>
  <text class="box-title" x="1090" y="360">Overfit sequence sampler</text>
  <text class="box-text" x="1090" y="406">指定 scene / instance_id / frame_indices</text>
  <text class="box-text" x="1090" y="442">例：[133,162,520,566,477]</text>
  <text class="box-text" x="1090" y="478">target_mode=instance，只监督同一实例</text>

  <rect class="input" x="2100" y="300" width="820" height="230" rx="24"/>
  <text class="box-title" x="2140" y="360">Reference prompt + supervision</text>
  <text class="box-text" x="2140" y="406">reference GT mask → box / mask prompt</text>
  <text class="box-text" x="2140" y="442">GT instance mask：[T,256,384]</text>
  <text class="box-text" x="2140" y="478">用于 BCE + Dice mask loss</text>

  <rect class="diag" x="1160" y="610" width="1060" height="150" rx="24"/>
  <text class="box-title" x="1200" y="670">当前 hard case 的目的</text>
  <text class="box-text" x="1200" y="716">前面帧可见/遮挡，中间不可见，后面大视角重新出现；检验 3D 信息是否能帮助 SAM3 重新检出目标</text>

  <!-- B features -->
  <rect class="frozen" x="150" y="1030" width="950" height="190" rx="24"/>
  <text class="box-title" x="190" y="1090">SAM3 image/tracker backbone</text>
  <text class="box-text" x="190" y="1136">输入 resize 到 1008×1008</text>
  <text class="box-text" x="190" y="1172">enable_inst_interactivity=True</text>
  <rect x="970" y="1050" width="92" height="38" rx="12" fill="#4b6b9b"/><text class="tag" x="985" y="1076">Frozen</text>

  <rect class="frozen" x="150" y="1290" width="950" height="220" rx="24"/>
  <text class="box-title" x="190" y="1350">SAM3 tokens for fusion</text>
  <text class="box-text" x="190" y="1396">source：tracker_fpn2</text>
  <text class="box-text" x="190" y="1432">tracker_fpn2：[T,256,72,72]</text>
  <text class="box-text" x="190" y="1468">concat prompt language [1,256]</text>
  <text class="box-text" x="190" y="1504">per frame：[1,5184,512]</text>

  <rect class="frozen" x="150" y="1580" width="950" height="150" rx="24"/>
  <text class="box-title" x="190" y="1640">SAM3 tracker cache for source flow</text>
  <text class="box-text" x="190" y="1686">fpn0 / fpn1 / fpn2 + pos0 / pos1 / pos2</text>

  <rect class="frozen" x="1360" y="1030" width="950" height="190" rx="24"/>
  <text class="box-title" x="1400" y="1090">StreamVGGT aggregator</text>
  <text class="box-text" x="1400" y="1136">streaming_cache=True，逐帧 KV cache</text>
  <text class="box-text" x="1400" y="1172">layer_index=-1，dim=2048</text>
  <rect x="2180" y="1050" width="92" height="38" rx="12" fill="#4b6b9b"/><text class="tag" x="2195" y="1076">Frozen</text>

  <rect class="frozen" x="1360" y="1290" width="950" height="210" rx="24"/>
  <text class="box-title" x="1400" y="1350">Geometry context</text>
  <text class="box-text" x="1400" y="1396">aggregator last-layer patch tokens</text>
  <text class="box-text" x="1400" y="1432">resize → context_grid=12×12</text>
  <text class="box-text" x="1400" y="1468">per frame：[1,144,2048]</text>

  <rect class="frozen" x="1360" y="1570" width="950" height="160" rx="24"/>
  <text class="box-title" x="1400" y="1630">Camera tokens</text>
  <text class="box-text" x="1400" y="1676">camera_head 最后一层 pose encoding：[1,1,9]</text>

  <rect class="optional" x="2500" y="1140" width="680" height="260" rx="24"/>
  <text class="box-title" x="2540" y="1200">StreamVGGT DPT tokens</text>
  <text class="box-text" x="2540" y="1246">dpt_layer_indices=[4,11,17,23]</text>
  <text class="box-text" x="2540" y="1282">用于 point_decoder=stream_dpt</text>
  <text class="box-text" x="2540" y="1318">当前 mask 消融里 point loss 通常设 0</text>

  <!-- C fusion -->
  <rect class="train" x="240" y="2020" width="900" height="260" rx="24"/>
  <text class="box-title" x="280" y="2080">Geometry ablation switch</text>
  <text class="box-text" x="280" y="2126">none：使用 StreamVGGT 3D + camera</text>
  <text class="box-text" x="280" y="2162">zero：geometry/camera 置零</text>
  <text class="box-text" x="280" y="2198">用于判断提升是否真的来自 3D 信息</text>

  <rect class="train" x="1320" y="1980" width="1180" height="340" rx="24"/>
  <text class="box-title" x="1360" y="2040">Camera-guided fusion</text>
  <text class="box-text" x="1360" y="2086">SAM tracker_fpn2 tokens → Linear：query [1,5184,256]</text>
  <text class="box-text" x="1360" y="2122">VGGT geometry [1,144,2048] → key/value [1,144,256]</text>
  <text class="box-text" x="1360" y="2158">camera [1,1,9] → camera context [1,1,256]</text>
  <text class="box-text" x="1360" y="2194">cross attention + camera gate + residual norm</text>
  <text class="box-text" x="1360" y="2230">输出 fused tokens：[1,5184,256]</text>
  <rect x="2350" y="2000" width="112" height="38" rx="12" fill="#b7791f"/><text class="tag" x="2365" y="2026">Trainable</text>

  <rect class="train" x="2700" y="2020" width="520" height="260" rx="24"/>
  <text class="box-title" x="2740" y="2080">Object query</text>
  <text class="box-text" x="2740" y="2126">reference GT mask</text>
  <text class="box-text" x="2740" y="2162">在 fused 72×72 grid 上池化</text>
  <text class="box-text" x="2740" y="2198">[1,256]</text>

  <rect class="train" x="960" y="2450" width="1480" height="250" rx="24"/>
  <text class="box-title" x="1000" y="2510">SAM3 FPN residual adapter</text>
  <text class="box-text" x="1000" y="2556">fused tokens reshape → [T,256,72,72]，叠加 object query</text>
  <text class="box-text" x="1000" y="2592">Conv adapter 生成三层 residual；SAM3 / StreamVGGT 权重冻结</text>
  <text class="box-text" x="1000" y="2628">residual_fpn0 [T,32,288,288] ｜ residual_fpn1 [T,64,144,144] ｜ residual_fpn2 [T,256,72,72]</text>
  <rect x="2280" y="2470" width="112" height="38" rx="12" fill="#b7791f"/><text class="tag" x="2295" y="2496">Trainable</text>

  <!-- D paths -->
  <rect class="source" x="140" y="3040" width="1040" height="330" rx="24"/>
  <text class="box-title" x="180" y="3100">Trainable SAM3 source-flow path</text>
  <text class="box-text" x="180" y="3146">--sam3-source-flow</text>
  <text class="box-text" x="180" y="3182">直接调用 SAM3 tracker source track_step</text>
  <text class="box-text" x="180" y="3218">输入：原始 tracker FPN + trainable residual</text>
  <text class="box-text" x="180" y="3254">reference frame 用 GT box/mask prompt</text>
  <text class="box-text" x="180" y="3290">输出：sam3_source logits [T,256,384]，可反传到 adapter</text>

  <rect class="loss" x="140" y="3440" width="1040" height="200" rx="24"/>
  <text class="box-title" x="180" y="3500">主训练 loss</text>
  <text class="box-text" x="180" y="3546">primary_mask_source=sam3_source</text>
  <text class="box-text" x="180" y="3582">BCE + Dice vs GT instance mask</text>
  <text class="box-text" x="180" y="3618">梯度：loss → SAM3 source logits → residual adapter / fusion</text>

  <rect class="eval" x="1320" y="3040" width="860" height="310" rx="24"/>
  <text class="box-title" x="1360" y="3100">Original SAM3 direct baseline</text>
  <text class="box-text" x="1360" y="3146">--compare-sam3-direct</text>
  <text class="box-text" x="1360" y="3182">RGB + reference GT box prompt</text>
  <text class="box-text" x="1360" y="3218">走原版 SAM3 video predictor</text>
  <text class="box-text" x="1360" y="3254">不使用 3D，不训练，只输出 IoU / id 诊断</text>

  <rect class="eval" x="2320" y="3040" width="900" height="310" rx="24"/>
  <text class="box-title" x="2360" y="3100">Inference-only full-flow residual path</text>
  <text class="box-text" x="2360" y="3146">--sam3-full-flow</text>
  <text class="box-text" x="2360" y="3182">通过 predictor 注入 residual，但 residual detach</text>
  <text class="box-text" x="2360" y="3218">主要用于可视化/评估，不是主反传路径</text>

  <rect class="diag" x="1320" y="3440" width="900" height="220" rx="24"/>
  <text class="box-title" x="1360" y="3500">Objectness gate diagnostics</text>
  <text class="box-text" x="1360" y="3546">SAM3 内部：object_score_logits &gt; 0 才认为目标存在</text>
  <text class="box-text" x="1360" y="3582">输出：sam3_source_present_frames / min_object_score</text>
  <text class="box-text" x="1360" y="3618">CSV：sam3_source_object_scores.csv</text>

  <rect class="diag" x="2320" y="3440" width="900" height="220" rx="24"/>
  <text class="box-title" x="2360" y="3500">Visualization / metrics</text>
  <text class="box-text" x="2360" y="3546">training_history.csv / curves.png</text>
  <text class="box-text" x="2360" y="3582">step_xxxxxx.png：GT / Pred / SAM3 direct / source</text>
  <text class="box-text" x="2360" y="3618">sam3_direct_instance_diagnostics.csv</text>

  <!-- E optional -->
  <rect class="optional" x="170" y="3940" width="950" height="170" rx="24"/>
  <text class="box-title" x="210" y="4000">Optional point branch</text>
  <text class="box-text" x="210" y="4046">simple point head 或 StreamVGGT DPT decoder</text>
  <text class="box-text" x="210" y="4082">point / chamfer / reprojection loss 可开关</text>

  <rect class="optional" x="1260" y="3940" width="950" height="170" rx="24"/>
  <text class="box-title" x="1300" y="4000">当前 mask 消融常用设置</text>
  <text class="box-text" x="1300" y="4046">point/text/aux/match/chamfer/reproj weight = 0</text>
  <text class="box-text" x="1300" y="4082">train_scope=sam_adapter，只训 fusion + SAM residual adapter</text>

  <rect class="optional" x="2340" y="3940" width="880" height="170" rx="24"/>
  <text class="box-title" x="2380" y="4000">关键消融</text>
  <text class="box-text" x="2380" y="4046">geometry_ablation=none vs zero</text>
  <text class="box-text" x="2380" y="4082">对比 3D+camera 是否比 zero geometry 更早打开 object gate</text>

  <!-- arrows A -->
  <path class="arrow" d="M900 415 L1050 415"/>
  <path class="arrow" d="M1900 415 L2100 415"/>
  <path class="arrow" d="M2510 530 L2510 610 L2220 685"/>
  <path class="arrow" d="M1475 530 L1475 610"/>

  <!-- arrows B -->
  <path class="arrow" d="M540 520 L540 880 L625 880 L625 1030"/>
  <path class="arrow" d="M625 1220 L625 1290"/>
  <path class="thin" d="M625 1220 L625 1580"/>
  <path class="arrow" d="M1835 520 L1835 880 L1835 1030"/>
  <path class="arrow" d="M1835 1220 L1835 1290"/>
  <path class="thin" d="M1835 1220 L2840 1220 L2840 1140"/>
  <path class="arrow" d="M1835 1500 L1835 1570"/>

  <!-- B to C arrows -->
  <path class="arrow" d="M625 1510 L625 1860 L1770 1860 L1770 1980"/>
  <path class="arrow" d="M1835 1500 L1835 1880 L1960 1880 L1960 1980"/>
  <path class="arrow" d="M1835 1730 L1835 1880"/>
  <path class="thin" d="M625 1730 L625 2020"/>
  <path class="arrow" d="M690 2280 L1320 2150"/>
  <path class="arrow" d="M1910 2320 L1910 2450"/>
  <path class="arrow" d="M2510 530 L2510 2050 L2700 2150"/>
  <path class="arrow" d="M2960 2280 L2440 2570"/>
  <path class="arrow" d="M1700 2320 L1700 2450"/>

  <!-- C to D arrows -->
  <path class="arrow" d="M1700 2700 L660 2700 L660 3040"/>
  <path class="thin" d="M625 1730 L370 1730 L370 3040"/>
  <path class="thin" d="M2510 530 L2510 2920 L1750 2920 L1750 3040"/>
  <path class="nograd" d="M1700 2700 L2770 2700 L2770 3040"/>
  <path class="arrow" d="M660 3370 L660 3440"/>
  <path class="grad" d="M660 3440 L660 2840 L960 2570"/>
  <path class="thin" d="M660 3370 L1770 3370 L1770 3440"/>
  <path class="thin" d="M1750 3350 L1750 3440"/>
  <path class="thin" d="M2770 3350 L2770 3440"/>

  <!-- E arrows -->
  <path class="thin" d="M2840 1400 L2840 3860 L645 3860 L645 3940"/>
  <path class="thin" d="M660 3640 L660 3860 L1735 3860 L1735 3940"/>
  <path class="thin" d="M690 2280 L690 3860 L2780 3860 L2780 3940"/>

  <!-- Labels -->
  <rect class="label" x="725" y="2825" width="250" height="44" rx="10"/>
  <text class="small" x="745" y="2856">可反传主路径</text>
  <rect class="label" x="2805" y="2795" width="245" height="44" rx="10"/>
  <text class="small" x="2825" y="2826">detach / eval</text>
  <rect class="label" x="720" y="3058" width="250" height="44" rx="10"/>
  <text class="small" x="740" y="3089">原始 SAM3 FPN</text>
  <rect class="label" x="730" y="3348" width="240" height="44" rx="10"/>
  <text class="small" x="750" y="3379">loss 反传</text>

  <!-- Legend -->
  <rect class="input" x="120" y="4218" width="38" height="30" rx="8"/>
  <text class="tiny" x="174" y="4242">Data / GT</text>
  <rect class="frozen" x="450" y="4218" width="38" height="30" rx="8"/>
  <text class="tiny" x="504" y="4242">Frozen backbone</text>
  <rect class="train" x="900" y="4218" width="38" height="30" rx="8"/>
  <text class="tiny" x="954" y="4242">Trainable fusion / adapter</text>
  <rect class="source" x="1490" y="4218" width="38" height="30" rx="8"/>
  <text class="tiny" x="1544" y="4242">Trainable SAM3 source path</text>
  <rect class="eval" x="2140" y="4218" width="38" height="30" rx="8"/>
  <text class="tiny" x="2194" y="4242">No-grad eval baseline</text>
  <rect class="loss" x="2700" y="4218" width="38" height="30" rx="8"/>
  <text class="tiny" x="2754" y="4242">Loss / supervision</text>
</svg>
