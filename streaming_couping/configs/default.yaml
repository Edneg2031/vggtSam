# Frozen SAM3 + frozen StreamVGGT recovery/writeback ablation.
dataset:
  manifest: data/processed/scannetpp_pinhole_2d/manifest.json
  scene_id: 00a231a370
  frame_indices: [90, 105, 119, 130, 140, 210, 240]
  min_pixels: 128
  max_area_ratio: 0.25
  excluded_labels: [object, unknown, wall, floor, ceiling]

sam3:
  repo: externals/sam3
  checkpoint: /home/bod/86Nas/95_data_bak/FoundationModels/sam3/sam3.pt
  device: cuda:3
  output_threshold: 0.5
  prompt_with_box: true

streamvggt:
  repo: externals/streamvggt
  checkpoint: /home/bod/86Nas/95_data_bak/FoundationModels/StreamVGGT/checkpoints.pth
  device: cuda:1
  streaming_cache: true
  image_mode: crop

bridge:
  output_size: [256, 384]
  tracker_low_score: 0.5
  fallback_on_missing_mask: true
  # A non-empty, high-score mask may still be tracking the wrong instance.
  # Trigger recovery when it covers too little aligned 3D support.
  fallback_on_geometry_disagreement: true
  tracker_min_geometry_coverage: 0.25
  # Fraction of projected support pixels that the selected dense mask must cover.
  recovery_min_support_coverage: 0.50
  # Only jointly reliable tracker observations may expand the persistent map.
  map_update_min_score: 0.50
  map_update_min_geometry_coverage: 0.50
  max_points_per_observation: 8000
  max_points_per_object: 20000

candidate:
  # Robust projection/support region used to rank full-mask candidates.
  box_quantile: 0.02
  box_padding_ratio: 0.12
  min_projected_points: 24
  min_projected_fraction: 0.005
  min_supported_points: 8
  min_support_ratio: 0.02
  # Current StreamVGGT pointmap support in its shared reconstruction frame.
  # These are model-space units, not guaranteed metric meters.
  support_abs_distance: 0.15
  support_relative_distance: 0.10

point_cloud:
  # Confidence is normalized independently on each StreamVGGT frame.
  confidence_threshold: 0.30
  max_points: 400000
  # GT geometry is evaluation-only. Distances are meters after one fixed
  # reference-frame Sim(3) alignment.
  metric_max_points: 4096
  metric_thresholds: [0.05, 0.10]

output:
  dir: outputs/streaming_couping_complete_ablation_37_68_54
