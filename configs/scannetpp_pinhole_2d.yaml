# ScanNet++ pinhole/undistorted preprocessing config.
# The expected scene layout is:
#   data/<scene_id>/
#     images/
#     masks/                 # optional; not treated as semantic labels here
#     colmap/
#     mesh_aligned_0.05.ply
#     points3DfromMesh.ply   # optional, not used by rasterization
# Semantic/instance annotations are read from the original ScanNet++ aligned
# scans root. Only its 3D mesh/segments are used; its fisheye cameras/images
# are not used by this pinhole preprocessing path.
#
# Command-line flags override these values.
data_root: /home/bod/184Nas/open_source/scannet_pp_pinhole/data
output_root: data/processed/scannetpp_pinhole_2d

# Keep this list small while debugging. You can also pass --scene-ids 00a231a370.
scene_ids: []
scene_list: /home/bod/184Nas/open_source/scannet_pp_pinhole/scannetpp_part_valid_scenes.txt
limit_scenes:

mesh_filename: mesh_aligned_0.05.ply

# 3D annotation source. These paths should point to the original ScanNet++
# release that has scans/mesh_aligned_0.05_semantic.ply and segments_anno.json.
annotation_root: /home/bod/184Nas/open_source/scannet_pp/data
annotation_scan_subdir: scans
semantic_mesh_filename: mesh_aligned_0.05_semantic.ply
segments_filename: segments.json
annotations_filename: segments_anno.json

metadata_root: /home/bod/184Nas/open_source/scannet_pp_pinhole/metadata
semantic_classes_file:

# Frames are sampled in COLMAP images.txt order, then stride/truncated here.
frame_step: 1
max_frames:

near: 0.001
semantic_ignore_label: 65535
save_visualizations: true
save_raster: true
save_pointmaps: true
# Cache readable RGB copies beside masks/pointmaps instead of depending on the
# original NAS tree at training time.
cache_images: true

skip_existing: true
dry_run: false
