# ScanNet++ pinhole/undistorted preprocessing config.
# The expected scene layout is:
#   data/<scene_id>/
#     images/
#     masks/                 # optional; not treated as semantic labels here
#     colmap/
#     mesh_aligned_0.05.ply
#     points3DfromMesh.ply   # optional, not used by rasterization
#
# Command-line flags override these values.
data_root: /home/bod/184Nas/open_source/scannet_pp_pinhole/data
output_root: data/processed/scannetpp_pinhole_2d

# Keep this list small while debugging. You can also pass --scene-ids 00a231a370.
scene_ids: []
scene_list: /home/bod/184Nas/open_source/scannet_pp_pinhole/scannetpp_part_valid_scenes.txt
limit_scenes:

mesh_filename: mesh_aligned_0.05.ply
metadata_root: /home/bod/184Nas/open_source/scannet_pp_pinhole/metadata
semantic_classes_file:

# Frames are sampled in COLMAP images.txt order, then stride/truncated here.
frame_step: 1
max_frames:

near: 0.001
semantic_ignore_label: 65535
save_visualizations: true
save_raster: true
save_pointmaps: true

skip_existing: true
dry_run: false
