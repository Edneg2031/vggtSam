# Dense SAM3/StreamVGGT fusion training.
# This is the full first baseline: losses are computed on an image grid, not on
# the 72x72 latent token grid. Increase model.output_size if memory allows.

dataset:
  manifest: data/processed/scannetpp_pinhole_2d/manifest.json
  scene_id: 00a231a370
  sequence_length: 4
  frame_stride: 1
  # Optional explicit frame ids, e.g. [0, 20, 40, 60]. Overrides sliding windows.
  frame_indices:

objects:
  min_pixels: 128
  max_area_ratio: 0.25
  min_visible_frames: 2
  max_objects_per_frame: 32
  ignore_instance_id: 0
  semantic_ignore_label: 65535
  excluded_semantic_labels: []
  # Empty means sample a valid instance class dynamically.
  target_object_labels: []
  # instance: supervise only the sampled instance mask.
  # class: supervise all visible instances with the sampled class label.
  target_mode: instance
  excluded_object_labels:
    - object
    - objects
    - unknown
    - wall
    - floor
    - ceiling
    - window
    - door
    - door frame
    - pillar
    - table
    - cabinet
    - storage cabinet
    - whiteboard
    - electrical duct
    - electric duct

sam3:
  repo: externals/sam3
  checkpoint: /home/bod/86Nas/95_data_bak/FoundationModels/sam3/sam3.pt
  # Empty means use training.device. Set e.g. cuda:0 to split GPUs.
  device:
  # 1 is safest for long manual overfit sequences; set 0 to process all frames at once.
  frame_chunk_size: 1
  prompt: object
  prompt_mode: random_instance
  resolution: 1008
  # tracker_fpn2 is aligned with SAM3/SAM2 tracker mask decoding. The old
  # detector_fpn2 source is useful for open-vocabulary detector-token probes,
  # but is not the right default for 3AM-style SAM-flow fusion.
  feature_source: tracker_fpn2
  text_conditioning: concat
  enable_inst_interactivity: true
  # Direct SAM3 video tracker mask provider. This bypasses fused-token SAM decoding
  # and is only used when history.update_source or loss.point_valid_source is sam3_direct.
  # compare_direct only runs original SAM3 for visualization/IoU comparison.
  compare_direct: true
  # Full SAM3-flow hook: inject fused SAM/VGGT residuals into SAM3 tracker FPN,
  # then let SAM3 run its own memory propagation and mask decoding.
  full_flow: false
  full_residual_scale: 1.0
  # Trainable 3AM-style proxy: frozen SAM3 prompt/mask decoder receives the
  # same fused residual adapter features as full_flow, so mask loss can
  # backpropagate into the adapter. The official video predictor remains an
  # evaluation/visualization path because it runs under inference_mode.
  full_trainable_proxy: false
  full_proxy_mask_weight: 0.0
  full_proxy_dice_weight: 0.0
  # Trainable source-flow path: bypass the inference-only predictor and call
  # SAM3 tracker source `track_step` directly. This keeps SAM3 frozen but lets
  # mask loss backpropagate into the fused residual adapter.
  source_flow: false
  source_mask_weight: 0.0
  source_dice_weight: 0.0
  direct_device:
  direct_prompt_with_box: true
  direct_output_prob_thresh: 0.5
  direct_async_loading_frames: false

geometry:
  repo: externals/streamvggt
  checkpoint: /home/bod/86Nas/95_data_bak/FoundationModels/StreamVGGT/checkpoints.pth
  # Empty means use training.device. Set e.g. cuda:1 to split GPUs.
  device:
  # True: frame-by-frame StreamVGGT KV cache. Set false for whole-clip extraction.
  streaming_cache: true
  # Internal latent fusion grid. This is not the supervision/output resolution.
  feature_grid: [72, 72]
  context_grid: [12, 12]
  layer_index: -1
  # StreamVGGT DPT point decoder uses these original aggregator layers.
  dpt_layer_indices: [4, 11, 17, 23]
  image_mode: crop
  use_camera_tokens: true

model:
  # Dense output/loss grid. Set to [350, 518] or larger if memory allows.
  output_size: [256, 384]
  d_fuse: 256
  num_heads: 8
  embedding_dim: 256
  # simple_cross_attn: old one-stage SAM-query / geometry-key-value fusion.
  # camera_guided: SpaceMind-style camera-guided geometry residual into SAM tokens.
  fusion_type: camera_guided
  # dense: old lightweight mask_head.
  # fused_sam: use SAM3 prompt/mask decoder output as the main Pred mask.
  # sam3_direct: use original SAM3 video tracker masks as the main Pred mask.
  # sam3_full_proxy: use the trainable frozen-SAM3 decoder proxy as Pred.
  # sam3_source: use the trainable SAM3 source-flow tracker logits as Pred.
  primary_mask_source: fused_sam
  # Auxiliary closed-set semantic classifier. Must be larger than processed
  # semantic class ids; the open-vocabulary path uses text alignment.
  num_classes: 1024
  dropout: 0.0
  # simple: old shallow Conv point head.
  # stream_dpt: StreamVGGT DPT point decoder, conditioned by fused/object tokens.
  point_decoder: stream_dpt
  # none: old StreamDPT adapter.
  # gt_soft: inject GT instance mask as a soft spatial residual into DPT patch tokens.
  point_mask_condition: none
  stream_dpt_use_pretrained: true
  stream_dpt_freeze: false

loss:
  mask_weight: 1.0
  dice_weight: 1.0
  point_weight: 1.0
  # gt: point loss only on GT object mask.
  # pred: point loss only where the current predicted mask is above threshold.
  # sam3_direct: point loss only on SAM3 video-tracker mask.
  # sam3_source: point loss only on trainable SAM3 source-flow mask.
  point_valid_source: gt
  point_valid_threshold: 0.5
  chamfer_weight: 0.1
  reprojection_weight: 0.1
  text_weight: 0.5
  aux_cls_weight: 0.1
  match_weight: 0.25
  temperature: 0.07
  max_match_pixels: 2048
  max_chamfer_points: 1024
  negative_ratio: 8

history:
  # Update object_query over time using frame-level evidence.
  enabled: true
  # gt is stable for overfit training; pred is closer to inference-time memory.
  # fused_sam routes fused tokens through SAM3 prompt/mask decoder and uses that
  # mask to update object memory.
  # sam3_direct uses SAM3's original video tracker mask as the update mask.
  update_source: gt
  pred_threshold: 0.5
  # sam3_direct uses the original SAM3 video tracker memory mask as the prompt
  # to the fused SAM decoder. This is the current 3AM-style bridge: SAM3 keeps
  # target memory, while fused SAM/VGGT features participate in final decoding.
  fused_sam_prompt_source: sam3_direct

fused_sam:
  # replace: adapter output replaces SAM image/high-res features.
  # residual: original SAM3 tracker features + adapter(fused tokens) residual.
  feature_mode: residual
  mask_weight: 0.0
  dice_weight: 0.0

training:
  device: cuda
  iterations: 200
  lr: 0.0003
  # all: train the full dense fusion model.
  # sam_adapter: freeze the model and train only SAM/fusion adapter parameters.
  train_scope: all
  seed: 0
  # Overfit repeats one window and one target instance. This is the first sanity
  # test for instance tracking; turn it off for random-window training.
  overfit: true
  overfit_window_index: 0
  overfit_instance_id:
  log_every: 10
  save_every: 100
  visualize_every: 20
  visualize_threshold: 0.5
  output_dir: outputs/dense_fusion_debug

visualization:
  max_visual_points: 100000
