# Dense SAM3/StreamVGGT fusion training.
# This is the full first baseline: losses are computed on an image grid, not on
# the 72x72 latent token grid. Increase model.output_size if memory allows.

dataset:
  manifest: data/processed/scannetpp_pinhole_2d/manifest.json
  scene_id: 00a231a370
  sequence_length: 4
  frame_stride: 1
  # Optional explicit frame ids, e.g. [0, 20, 40, 60]. Overrides sliding windows.
  frame_indices:

objects:
  min_pixels: 128
  max_area_ratio: 0.25
  min_visible_frames: 2
  max_objects_per_frame: 32
  ignore_instance_id: 0
  semantic_ignore_label: 65535
  excluded_semantic_labels: []
  # Empty means sample a valid instance class dynamically.
  target_object_labels: []
  # instance: supervise only the sampled instance mask.
  # class: supervise all visible instances with the sampled class label.
  target_mode: instance
  excluded_object_labels:
    - object
    - objects
    - unknown
    - wall
    - floor
    - ceiling
    - window
    - door
    - door frame
    - pillar
    - table
    - cabinet
    - storage cabinet
    - whiteboard
    - electrical duct
    - electric duct

sam3:
  repo: externals/sam3
  checkpoint: /home/bod/86Nas/95_data_bak/FoundationModels/sam3/sam3.pt
  # Empty means use training.device. Set e.g. cuda:0 to split GPUs.
  device:
  # 1 is safest for long manual overfit sequences; set 0 to process all frames at once.
  frame_chunk_size: 1
  prompt: object
  prompt_mode: random_instance
  resolution: 1008
  feature_source: detector_fpn2
  text_conditioning: concat
  enable_inst_interactivity: false
  # Optional validation branch using SAM3's original video predictor memory.
  # It is off by default so existing dense training behavior is unchanged.
  tracker_enabled: false
  tracker_device:
  tracker_prompt_with_box: true
  tracker_output_prob_thresh: 0.5
  tracker_async_loading_frames: false

geometry:
  repo: externals/streamvggt
  checkpoint: /home/bod/86Nas/95_data_bak/FoundationModels/StreamVGGT/checkpoints.pth
  # Empty means use training.device. Set e.g. cuda:1 to split GPUs.
  device:
  # True: frame-by-frame StreamVGGT KV cache. Set false for whole-clip extraction.
  streaming_cache: true
  # Internal latent fusion grid. This is not the supervision/output resolution.
  feature_grid: [72, 72]
  context_grid: [12, 12]
  layer_index: -1
  # StreamVGGT DPT point decoder uses these original aggregator layers.
  dpt_layer_indices: [4, 11, 17, 23]
  image_mode: crop
  use_camera_tokens: false

model:
  # Dense output/loss grid. Set to [350, 518] or larger if memory allows.
  output_size: [256, 384]
  d_fuse: 256
  num_heads: 8
  embedding_dim: 256
  # Auxiliary closed-set semantic classifier. Must be larger than processed
  # semantic class ids; the open-vocabulary path uses text alignment.
  num_classes: 1024
  dropout: 0.0
  # simple: old shallow Conv point head.
  # stream_dpt: StreamVGGT DPT point decoder, conditioned by fused/object tokens.
  point_decoder: stream_dpt
  stream_dpt_use_pretrained: true
  stream_dpt_freeze: false

loss:
  mask_weight: 1.0
  dice_weight: 1.0
  point_weight: 1.0
  # gt: point loss only on GT object mask.
  # pred: point loss only where the current predicted mask is above threshold.
  point_valid_source: gt
  point_valid_threshold: 0.5
  chamfer_weight: 0.1
  reprojection_weight: 0.1
  text_weight: 0.5
  aux_cls_weight: 0.1
  match_weight: 0.25
  temperature: 0.07
  max_match_pixels: 2048
  max_chamfer_points: 1024
  negative_ratio: 8

history:
  # Update object_query over time using frame-level evidence.
  enabled: true
  # gt is stable for overfit training; pred is closer to inference-time memory.
  update_source: gt
  pred_threshold: 0.5

training:
  device: cuda
  iterations: 200
  lr: 0.0003
  seed: 0
  # Overfit repeats one window and one target instance. This is the first sanity
  # test for instance tracking; turn it off for random-window training.
  overfit: true
  overfit_window_index: 0
  overfit_instance_id:
  log_every: 10
  save_every: 100
  visualize_every: 20
  visualize_threshold: 0.5
  output_dir: outputs/dense_fusion_debug

visualization:
  max_visual_points: 100000
